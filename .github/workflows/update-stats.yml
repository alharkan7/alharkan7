name: Update GitHub Stats SVGs

on:
  schedule:
    # Run at 00:00 every day
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PAT || secrets.GITHUB_TOKEN }} # Use PAT if available to push changes and trigger other workflows

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run update script
        env:
          # A Personal Access Token (PAT) is recommended here so the script can see all your repositories' stats.
          # The default GITHUB_TOKEN is scoped only to this specific repository.
          GITHUB_TOKEN: ${{ secrets.ACTIONS_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_USER: ${{ github.repository_owner }}
        run: python update_stats.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          git commit -m "Auto-update GitHub stats in SVGs" || echo "No changes to commit"
          git push
